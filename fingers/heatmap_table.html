<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark Leaderboard Heatmap</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
  background:#FAFAF8;
  font-family:'Times New Roman','DejaVu Serif',Georgia,serif;
  color:#333;
  min-height:100vh;
}

.container{ max-width:1200px; margin:0 auto; padding:30px 20px 80px 0; position:relative; }

/* ── Tabs ── */
.tabs{ display:flex; justify-content:center; gap:6px; margin-bottom:28px; }
.tab{
  padding:10px 32px; border:1px solid #C5C1BA; border-radius:8px;
  cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
  transition:all .3s; outline:none;
}
.tab:not(.active){ background:#E8E4DE; color:#333; }
.tab:not(.active):hover{ background:#DAD6CE; }
.tab.active{ background:#4E7B65; color:#fff; border-color:#4E7B65; }

/* ── Title ── */
.title{
  text-align:center; font-size:22px; font-weight:bold;
  color:#1a1a2e; margin-bottom:20px; letter-spacing:.3px;
}

/* ── Table wrapper ── */
.table-container{
  overflow-x:auto; padding:0;
  transition:opacity .25s ease;
}

/* ── Table ── */
table{ border-collapse:separate; border-spacing:1px; margin:0 auto 0 0; }

.corner-cell{ background:transparent; border:none; }

/* ── Group headers ── */
.group-header{
  background:#D5D0C8; color:#1a1a2e; font-size:14px; font-weight:bold;
  padding:11px 16px; border-radius:3px; border:0.5px solid rgba(187,183,174,.5);
  text-align:center;
}

/* ── Column headers ── */
.col-header{
  background:#E8E4DE; color:#333; font-size:12px; font-weight:bold;
  padding:9px 14px; border-radius:2px; border:0.5px solid rgba(197,193,186,.45);
  text-align:center; cursor:pointer; user-select:none;
  transition:background .2s; white-space:nowrap; position:relative;
}
.col-header:hover{ background:#D5D1C9; }
.sort-arrow{ font-size:10px; margin-left:2px; opacity:.35; transition:opacity .2s; }
.col-header.sort-active .sort-arrow{ opacity:1; color:#4E7B65; }

/* ── Model name ── */
.model-cell{
  text-align:right; padding:8px 14px 8px 8px; font-size:13.5px;
  color:#333; white-space:nowrap; background:transparent; border:none;
}
.model-cell.miro{ color:#4E7B65; font-weight:bold; }

/* ── Data cells ── */
.data-cell{
  text-align:center; padding:9px 10px; border-radius:2px; font-size:11.5px;
  border:0.5px solid rgba(197,193,186,.35); cursor:default; white-space:nowrap;
  transition:box-shadow .15s ease;
}
.data-cell:hover{
  box-shadow:inset 0 0 0 1.5px rgba(78,123,101,.45);
  z-index:10; position:relative;
}
.data-cell.best{ border:1.5px solid #4E7B65; font-weight:bold; }

/* ── Group separator (pseudo-element line) ── */
.data-cell.group-start,
.col-header.group-start{ position:relative; }
.data-cell.group-start::before,
.col-header.group-start::before{
  content:''; position:absolute; left:-1px; top:-1px; bottom:-1px;
  width:1.5px; background:#B0ADA6;
}

/* ── Miro row ── */
tr.miro-row{ background:rgba(243,250,245,.55); }

/* ── Row hover dimming ── */
.data-row{ transition:opacity .2s ease; }
tbody.row-hover-active .data-row{ opacity:.3; }
tbody.row-hover-active .data-row.row-hovered{ opacity:1; }

/* ── Tooltip ── */
.tooltip{
  position:fixed; pointer-events:none; background:#fff;
  border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,.14);
  padding:14px 18px; font-size:13px; line-height:1.7;
  z-index:1000; opacity:0; transition:opacity .15s;
  min-width:190px; border:1px solid #E8E4DE;
}
.tooltip.visible{ opacity:1; }
.tt-model{
  font-weight:bold; color:#1a1a2e; font-size:14px;
  margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid #E8E4DE;
}
.tt-row{ display:flex; justify-content:space-between; gap:16px; }
.tt-label{ color:#999; font-size:12px; }
.tt-value{ font-weight:600; color:#333; }
.tt-best{ color:#4E7B65; font-weight:bold; }

/* ── Colorbar ── */
.colorbar{
  position:fixed; right:28px; bottom:28px;
  display:flex; align-items:flex-end; gap:5px; z-index:50;
}
.colorbar-gradient{
  width:14px; height:100px; border-radius:4px;
  background:linear-gradient(to top,#F0EDE6,#D8DDD2,#A8C5B8,#7AA383,#4E7B65);
  border:1px solid #C5C1BA;
}
.colorbar-labels{
  display:flex; flex-direction:column; justify-content:space-between;
  height:100px; font-size:11px; color:#999;
}

</style>
</head>

<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="text">Text-Only Benchmark</button>
    <button class="tab" data-tab="multi">Multimodal Benchmark</button>
  </div>
  <h1 class="title" id="title"></h1>
  <div class="table-container" id="table-container"></div>
</div>

<div class="colorbar">
  <div class="colorbar-gradient"></div>
  <div class="colorbar-labels"><span>High</span><span>Mid</span><span>Low</span></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
/* ════════════════════════  DATA  ════════════════════════ */
const DATA = {
  text: {
    title: "Text-Only Benchmark \u2014 Leaderboard Heatmap",
    models: [
      "Kimi","MiroThinker-v1.7","ChatGPT","MiroThinker",
      "Gemini","Claude","Doubao","MiniMax","GLM","Qwen"
    ],
    groups: [
      { name:"Report", cols:[
        { name:"Avg",  values:[7.569,7.429,7.383,7.359,7.121,6.732,6.424,6.333,6.324,5.997] },
        { name:"Cov",  values:[8.0,7.9,7.8,7.9,7.7,7.3,7.3,7.0,7.0,6.4] },
        { name:"Ins",  values:[8.0,7.5,7.4,7.2,7.7,7.2,6.3,6.3,6.3,6.5] },
        { name:"Inst", values:[7.9,8.5,8.2,8.4,8.0,7.4,7.5,7.4,7.5,7.0] },
        { name:"Clr",  values:[7.6,8.0,7.7,8.0,7.0,7.1,6.7,7.1,6.8,6.8] },
      ]},
      { name:"Factuality", cols:[
        { name:"Ratio", values:[0.654,0.791,0.814,0.760,0.721,0.701,0.649,0.715,0.695,0.721] },
      ]},
      { name:"Process", cols:[
        { name:"Dep",   values:[5.94,6.44,6.73,5.72,6.66,4.26,4.16,6.22,5.94,6.41] },
        { name:"Ref",   values:[7.10,7.57,7.67,6.90,7.59,5.17,5.96,7.01,6.71,7.50] },
        { name:"Crt",   values:[6.76,7.16,7.47,6.96,6.41,4.70,5.57,6.25,5.93,7.41] },
        { name:"F\u2192R", values:[7.07,8.37,8.36,7.91,7.29,6.88,6.57,7.74,7.71,5.96] },
        { name:"R\u2192P", values:[4.68,5.94,5.98,5.66,5.06,3.72,3.68,5.30,5.14,3.97] },
        { name:"Con",   values:[7.04,8.25,7.99,7.49,7.44,6.17,5.42,7.43,7.23,5.69] },
        { name:"OVR",   values:[6.42,7.27,7.31,6.83,6.71,5.51,5.31,6.71,6.56,6.11] },
      ]},
    ]
  },
  multi: {
    title: "Multimodal Benchmark \u2014 Leaderboard Heatmap",
    models: [
      "MiroThinker-v1.7","MiroThinker","OpenAI","Gemini",
      "Claude","GLM","Grok","MiniMax","Manus","Qwen"
    ],
    groups: [
      { name:"Report", cols:[
        { name:"Tot",  values:[6.690,6.689,6.528,6.391,6.312,5.897,5.497,5.312,5.143,4.100] },
        { name:"Cov",  values:[6.950,6.949,6.970,6.914,6.997,6.467,6.362,5.936,5.621,4.323] },
        { name:"Ins",  values:[6.915,6.921,6.438,7.183,6.838,5.651,5.061,4.848,4.744,4.340] },
        { name:"Inst", values:[7.699,7.579,7.117,6.667,6.184,6.946,6.562,6.424,6.064,4.771] },
        { name:"Clr",  values:[7.231,7.262,6.844,6.040,5.910,6.342,5.702,5.957,5.717,4.894] },
      ]},
      { name:"Factuality", cols:[
        { name:"Ratio", values:[0.784,0.758,0.770,0.737,0.707,0.716,0.715,0.710,0.700,0.699] },
      ]},
      { name:"Process", cols:[
        { name:"Dep",   values:[5.70,5.50,6.21,6.53,2.88,5.23,4.43,5.90,5.72,5.13] },
        { name:"Ref",   values:[7.20,6.83,7.38,7.10,3.88,5.57,5.24,6.50,6.07,5.07] },
        { name:"Crt",   values:[6.30,5.97,7.00,5.83,2.92,4.47,4.24,4.37,4.34,5.77] },
        { name:"F\u2192R", values:[8.07,8.00,7.72,7.57,5.96,7.30,7.24,7.70,7.45,6.17] },
        { name:"R\u2192P", values:[5.87,5.70,5.62,4.90,3.08,4.70,4.14,5.20,5.45,3.93] },
        { name:"Con",   values:[7.08,8.00,7.21,7.30,5.72,7.07,6.52,7.50,7.41,5.63] },
        { name:"OVR",   values:[6.62,6.55,6.64,6.36,4.52,5.63,5.24,6.07,6.03,5.42] },
      ]},
    ]
  }
};

/* ════════════════════════  COLORMAP  ════════════════════════ */
const STOPS = [
  [240,237,230],[216,221,210],[168,197,184],[122,163,131],[78,123,101]
];
function cmapColor(t){
  t = Math.max(0,Math.min(1,t));
  const seg = t * (STOPS.length-1);
  const i = Math.min(Math.floor(seg), STOPS.length-2);
  const f = seg - i;
  const a = STOPS[i], b = STOPS[i+1];
  const r = Math.round(a[0]+(b[0]-a[0])*f);
  const g = Math.round(a[1]+(b[1]-a[1])*f);
  const bl= Math.round(a[2]+(b[2]-a[2])*f);
  return `rgb(${r},${g},${bl})`;
}

/* ════════════════════════  HELPERS  ════════════════════════ */
function isMiro(name){ return name.toLowerCase().includes('miro'); }
function fmt(v){ return v < 1 ? v.toFixed(3) : v.toFixed(2); }

function flattenCols(groups){
  const out = [];
  groups.forEach((g,gi) => {
    g.cols.forEach((c,ci) => {
      out.push({ name:c.name, group:g.name, values:c.values,
                 groupStart: ci===0 && gi>0 });
    });
  });
  return out;
}

function normCol(vals){
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const rng = mx-mn || 1;
  return vals.map(v=>(v-mn)/rng);
}

function rankIn(vals, idx){
  const v = vals[idx];
  const sorted = vals.slice().sort((a,b)=>b-a);
  return sorted.indexOf(v)+1;
}

/* ════════════════════════  STATE  ════════════════════════ */
let currentTab = 'text';
let sortCol = -1;
let sortDir = 'desc';
let sortAnimating = false;

/* ════════════════════════  RENDER  ════════════════════════ */
function render(tabKey){
  const ds = DATA[tabKey];
  const cols = flattenCols(ds.groups);
  const norms = cols.map(c=>normCol(c.values));
  const maxes = cols.map(c=>Math.max(...c.values));

  document.getElementById('title').textContent = ds.title;

  let h = '<table><thead><tr><th class="corner-cell" rowspan="2"></th>';
  ds.groups.forEach(g=>{
    h += `<th class="group-header" colspan="${g.cols.length}">${g.name}</th>`;
  });
  h += '</tr><tr>';
  cols.forEach((c,j)=>{
    const gs = c.groupStart ? ' group-start':'';
    h += `<th class="col-header${gs}" data-col="${j}">${c.name} <span class="sort-arrow">\u2195</span></th>`;
  });
  h += '</tr></thead>';

  h += '<tbody>';
  ds.models.forEach((model,i)=>{
    const mi = isMiro(model);
    const rc = mi?' miro-row':'';
    h += `<tr class="data-row${rc}" data-mi="${i}">`;
    h += `<td class="model-cell${mi?' miro':''}">${model}</td>`;

    cols.forEach((c,j)=>{
      const v = c.values[i], nv = norms[j][i];
      const bg = cmapColor(nv);
      const tc = nv>.72 ? '#fff':'#333';
      const best = v===maxes[j] ? ' best':'';
      const gs = c.groupStart ? ' group-start':'';
      h += `<td class="data-cell${best}${gs}" style="background:${bg};color:${tc}" `
         + `data-col="${j}" data-mi="${i}" data-v="${v}" data-nv="${nv.toFixed(4)}" `
         + `data-gn="${c.group}" data-cn="${c.name}">${fmt(v)}</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table>';

  const ct = document.getElementById('table-container');
  ct.innerHTML = h;
  bindEvents(tabKey);
}

/* ════════════════════════  EVENTS  ════════════════════════ */
function bindEvents(tabKey){
  const tbody = document.querySelector('tbody');
  const tooltip = document.getElementById('tooltip');

  /* ── Row hover ── */
  tbody.addEventListener('mouseover', e=>{
    const row = e.target.closest('.data-row');
    if(!row) return;
    tbody.classList.add('row-hover-active');
    tbody.querySelectorAll('.data-row').forEach(r=>r.classList.remove('row-hovered'));
    row.classList.add('row-hovered');
  });
  tbody.addEventListener('mouseleave', ()=>{
    tbody.classList.remove('row-hover-active');
    tbody.querySelectorAll('.data-row').forEach(r=>r.classList.remove('row-hovered'));
  });

  /* ── Tooltip ── */
  tbody.addEventListener('mouseover', e=>{
    const cell = e.target.closest('.data-cell');
    if(!cell){ tooltip.classList.remove('visible'); return; }

    const ds = DATA[tabKey];
    const ci = +cell.dataset.col, mi = +cell.dataset.mi;
    const v = +cell.dataset.v, nv = +cell.dataset.nv;
    const cols = flattenCols(ds.groups);
    const col = cols[ci];
    const rank = rankIn(col.values, mi);
    const total = ds.models.length;
    const best = Math.max(...col.values);
    const diff = v - best;

    const vsBest = Math.abs(diff)<1e-9
      ? '<span class="tt-best">\u2605 Best</span>'
      : `<span style="color:#c44">${diff.toFixed(3)}</span>`;

    const pct = Math.round(rank/total*100);

    tooltip.innerHTML = `
      <div class="tt-model">${ds.models[mi]}</div>
      <div class="tt-row"><span class="tt-label">${col.name} (${col.group})</span></div>
      <div class="tt-row"><span class="tt-label">Value</span><span class="tt-value">${fmt(v)}</span></div>
      <div class="tt-row"><span class="tt-label">Rank</span><span class="tt-value">${rank} / ${total}</span></div>
      <div class="tt-row"><span class="tt-label">vs Best</span>${vsBest}</div>
      <div class="tt-row"><span class="tt-label">Percentile</span><span class="tt-value">Top ${pct}%</span></div>`;
    tooltip.classList.add('visible');
  });

  tbody.addEventListener('mousemove', e=>{
    if(!tooltip.classList.contains('visible')) return;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    let x = e.clientX+16, y = e.clientY-10;
    if(x+tw > window.innerWidth-12) x = e.clientX-tw-16;
    if(y+th > window.innerHeight-12) y = e.clientY-th-10;
    if(y<8) y=8;
    tooltip.style.left = x+'px';
    tooltip.style.top  = y+'px';
  });

  tbody.addEventListener('mouseleave', ()=>{ tooltip.classList.remove('visible'); });

  /* ── Sort (FLIP animation) ── */
  document.querySelectorAll('.col-header').forEach(hdr=>{
    hdr.addEventListener('click', ()=>{
      if(sortAnimating) return;
      const ci = +hdr.dataset.col;

      if(sortCol===ci){ sortDir = sortDir==='desc'?'asc':'desc'; }
      else { sortCol=ci; sortDir='desc'; }

      document.querySelectorAll('.col-header').forEach(h=>{
        h.classList.remove('sort-active');
        h.querySelector('.sort-arrow').textContent = '\u2195';
      });
      hdr.classList.add('sort-active');
      hdr.querySelector('.sort-arrow').textContent = sortDir==='desc'?'\u25BC':'\u25B2';

      const cols = flattenCols(DATA[tabKey].groups);
      const colVals = cols[ci].values;
      const rows = Array.from(tbody.querySelectorAll('.data-row'));

      /* FIRST */
      const firstMap = new Map();
      rows.forEach(r=> firstMap.set(r, r.getBoundingClientRect()));

      /* Sort DOM */
      rows.sort((a,b)=>{
        const av = colVals[+a.dataset.mi], bv = colVals[+b.dataset.mi];
        return sortDir==='desc' ? bv-av : av-bv;
      });
      rows.forEach(r=> tbody.appendChild(r));

      /* LAST → INVERT → PLAY */
      sortAnimating = true;
      rows.forEach(r=>{
        const first = firstMap.get(r).top;
        const last  = r.getBoundingClientRect().top;
        const dy = first - last;
        if(Math.abs(dy)<1){ return; }
        r.style.transform = `translateY(${dy}px)`;
        r.style.transition = 'none';
        r.offsetHeight;                         // force reflow
        r.style.transition = 'transform .4s cubic-bezier(.25,.1,.25,1)';
        r.style.transform  = '';
      });
      setTimeout(()=>{ sortAnimating=false; }, 420);
    });
  });
}

/* ════════════════════════  TABS  ════════════════════════ */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const key = btn.dataset.tab;
    if(key===currentTab) return;

    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===key));

    const ct = document.getElementById('table-container');
    ct.style.opacity = '0';

    setTimeout(()=>{
      currentTab = key;
      sortCol = -1; sortDir = 'desc';
      render(key);
      requestAnimationFrame(()=>{ ct.style.opacity='1'; });
    }, 260);
  });
});

/* ════════════════════════  INIT  ════════════════════════ */
render('text');
</script>
</body>
</html>
